name: Paper
on:
  push:
    paths: [paper/**]
  pull_request:
    paths: [paper/**]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: paper
          path: paper/paper.pdf

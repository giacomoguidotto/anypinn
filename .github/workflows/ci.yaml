name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  UV_VERSION: "0.10.0"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: just test

  quality:
    name: quality (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: lint
            cmd: just lint
          - label: type check
            cmd: just check
          - label: docstrings
            cmd: just docstrings
          - label: docs
            cmd: just docs
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --locked

      - name: ${{ matrix.label }}
        run: ${{ matrix.cmd }}

  container:
    runs-on: ubuntu-latest
    steps:
      - name: Validate build configuration
        uses: docker/build-push-action@v7
        with:
          call: check

      - name: Build Container Image
        uses: docker/build-push-action@v7
        with:
          push: false

  release:
    needs: [test, quality, container]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog: "false"
          commit: "false"

  publish:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  deploy:
    needs: [release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Full history so uv-dynamic-versioning can read git tags.
          # Also re-fetch after release may have pushed a new tag.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --locked

      - name: Configure Git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth=1 || true

      - name: Deploy versioned docs
        run: |
          # Use the version from semantic-release if a release was made,
          # otherwise read the current version from the installed package.
          if [ "${{ needs.release.outputs.released }}" = "true" ]; then
            VERSION="${{ needs.release.outputs.version }}"
          else
            VERSION=$(uv run python -c "from importlib.metadata import version; import re; print(re.match(r'\d+\.\d+\.\d+', version('anypinn')).group())")
          fi
          echo "Deploying docs as v${VERSION}"
          PYTHONPATH=src uv run mike deploy --push --update-aliases "$VERSION" latest
          PYTHONPATH=src uv run mike set-default --push latest

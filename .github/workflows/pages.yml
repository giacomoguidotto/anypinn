# This GitHub Actions job will build the user guide and publish it to the
# gh-pages branch each time the main branch is updated. This branch is
# configured to be served automatically using GitHub Pages.
name: Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  UV_VERSION: "0.10.0"

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --locked

      - name: Publish Docs
        run: just docs-deploy

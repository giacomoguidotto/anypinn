# Set strict to true to turn warnings into errors to catch warnings within CI.
strict: true
validation:
  omitted_files: warn
  absolute_links: warn
  # Downgraded from warn: mkdocstrings generates cross-reference links for
  # types from external packages (e.g. torch.Tensor) that cannot be resolved
  # locally, producing false-positive warnings.
  unrecognized_links: info
  anchors: warn
theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  logo: assets/logo.png
  icon:
    # GitHub specific.
    repo: fontawesome/brands/github
  favicon: assets/logo.png
  features:
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - md_in_html
extra_css:
  - static/stylesheets/extra.css
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra:
  version:
    provider: mike
    default: latest
    alias: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/giacomoguidotto/anypinn
plugins:
  - search:
      separator: '[\s\-\.]+'
  - offline:
      enabled: !ENV [MKDOCS_MATERIAL_OFFLINE, false]
  - mkdocstrings:
      handlers:
        python:
          options:
            show_if_no_docstring: true
            show_signature_annotations: true
  # This plugin is used to validate URLs (including anchors).
  - htmlproofer:
      # This is not enabled by default because this requires network I/O, so it is inherently not
      # exactly reproducible. For larger projects, this can also slow local build times.
      validate_external_urls: !ENV [HTMLPROOFER_VALIDATE_EXTERNAL_URLS, false]
      raise_error: true
      # Ignore cross-reference links generated by mkdocstrings that use relative paths with anchors.
      # These links are valid but htmlproofer cannot resolve them correctly.
      ignore_urls:
        - "*#anypinn.*"
        # Single-letter "links" produced by mkdocstrings rendering math
        # notation like f(t, y) or u(x) from docstrings.
        - "x"
        - "t"
hooks:
  - docs/hooks/page_icons.py
  - docs/hooks/rewrite_links.py
watch:
  # Watch src/ directory to reload on changes to docstrings for mkdocstrings plugin.
  - src
site_url: https://anypinn.guidotto.dev/
site_name: AnyPINN
copyright: Copyright &copy; 2025 Giacomo Guidotto
# GitHub Specific Configuration.
repo_name: anypinn
repo_url: https://github.com/giacomoguidotto/anypinn
edit_uri: edit/main/docs/
